<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clippy Awakens</title>
    <link rel="stylesheet" type="text/css" href="build/clippy.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: visible;
            /* Allow clicks to pass through to desktop */
            pointer-events: none;
        }

        /* Clippy elements intercept mouse events */
        .clippy,
        .clippy-balloon {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <script src="vendor/jquery.min.js"></script>
    <script src="build/clippy.js"></script>
    <script src="clippy-test.js"></script>
    <script src="clippy-bridge.js"></script>
    <script src="clippy-bridge-test.js"></script>
    <script>
        // Point to local agents directory
        clippy.BASE_PATH = 'agents/';

        var currentAgent = null;
        var currentAgentName = 'Clippy';

        // Stores the latest terminal position so we can apply it as soon as the agent loads.
        // This fixes the race where the tracker emits before the agent is ready.
        var _lastTerminalInfo = null;

        // Anchor corner: "bottom-right" | "bottom-left" | "top-right" | "top-left"
        var _anchor = 'bottom-right';
        // Vertical offset in pixels (positive = away from anchored edge)
        var _verticalOffset = 0;

        // Position agent at the configured corner of the terminal window
        function positionAgentAtTerminal(agent, info) {
            var agentWidth = 124;
            var agentHeight = 93;
            var padding = 15;

            // Convert screen-absolute coords to webview-relative coords.
            var winOffsetX = window.screenX || 0;
            var winOffsetY = window.screenY || 0;

            var targetX, targetY;

            // Horizontal: left or right side of terminal
            if (_anchor.indexOf('right') !== -1) {
                targetX = info.x + info.width - agentWidth - padding;
            } else {
                targetX = info.x + padding;
            }

            // Vertical: top or bottom of terminal, with offset
            if (_anchor.indexOf('bottom') !== -1) {
                targetY = info.y + info.height - agentHeight - padding - _verticalOffset;
            } else {
                targetY = info.y + padding + _verticalOffset;
            }

            // Apply webview offset
            targetX -= winOffsetX;
            targetY -= winOffsetY;

            agent.moveTo(targetX, targetY, 0);
        }

        // Save position after drag (hooks into clippy.js drag end)
        function hookDragSave(agent) {
            var origFinishDrag = agent._finishDrag;
            if (origFinishDrag) {
                agent._finishDrag = function() {
                    origFinishDrag.call(this);
                    var offset = this._el ? this._el.offset() : null;
                    if (offset && window.__TAURI__) {
                        window.__TAURI__.core.invoke('save_position_cmd', {
                            x: offset.left,
                            y: offset.top
                        });
                    }
                };
            }
        }

        // Save agent preference when switching
        function saveAgentPreference(agentName) {
            if (window.__TAURI__) {
                window.__TAURI__.core.invoke('save_agent_preference', {
                    agent: agentName
                });
            }
        }

        // Switch to a different agent at runtime
        function switchAgent(name, callback) {
            console.log('Switching agent to:', name);

            // Save current position before destroying
            var lastPosition = null;
            if (currentAgent) {
                var offset = currentAgent._el ? currentAgent._el.offset() : null;
                if (offset) {
                    lastPosition = { left: offset.left, top: offset.top };
                }
                // Hide and destroy current agent
                currentAgent.hide(true);
                currentAgent.stop();
                // Remove DOM elements
                if (currentAgent._el) currentAgent._el.remove();
                if (currentAgent._balloon && currentAgent._balloon._balloon) {
                    currentAgent._balloon._balloon.remove();
                }
                currentAgent = null;
            }

            // Clear cached data so a fresh agent instance is created
            delete clippy.load._data[name];
            delete clippy.load._maps[clippy.BASE_PATH + name];
            delete clippy.load._sounds[name];

            clippy.load(name, function(agent) {
                currentAgent = agent;
                currentAgentName = name;

                // Restore position if we had one
                if (lastPosition) {
                    agent.moveTo(lastPosition.left, lastPosition.top, 0);
                }

                agent.show();
                hookDragSave(agent);

                // Save preference
                saveAgentPreference(name);

                // Run self-test on new agent
                clippySelfTest(agent);

                console.log('Switched to agent:', name);
                if (callback) callback(agent);
            }, function(err) {
                console.error('Failed to load agent ' + name + ':', err);
            });
        }

        // Register all Tauri event listeners
        function registerTauriListeners() {
            if (!window.__TAURI__) {
                console.warn('ClippyBridge: Tauri API not available (running in browser?)');
                return;
            }

            // Listen for pre-canned events from Rust backend
            window.__TAURI__.event.listen('clippy-event', function(event) {
                console.log('ClippyBridge: Received event:', event.payload);
                var eventType = event.payload.type || event.payload;
                ClippyBridge.handleEvent(eventType);
            });

            // Listen for custom messages from /message endpoint
            window.__TAURI__.event.listen('clippy-message', function(event) {
                console.log('ClippyBridge: Received custom message:', event.payload);
                var text = event.payload.text || event.payload;
                ClippyBridge.handleCustomMessage(text);
            });

            // Listen for tray visibility toggle
            window.__TAURI__.event.listen('clippy-visibility', function(event) {
                var visible = event.payload;
                if (visible && currentAgent) {
                    currentAgent.show();
                    currentAgent.play('Greeting');
                    currentAgent.speak('You summoned me! What can I do for you?');
                } else if (!visible && currentAgent) {
                    currentAgent.play('GoodBye');
                    setTimeout(function() {
                        if (currentAgent) {
                            currentAgent.hide();
                        }
                    }, 1500);
                }
            });

            // Listen for mute toggle from tray — persist to config
            window.__TAURI__.event.listen('clippy-mute', function(event) {
                var muted = event.payload;
                console.log('Sound muted:', muted);
                window.__TAURI__.core.invoke('save_mute_state', { muted: muted });
            });

            // Listen for terminal window position updates — anchor Clippy inside bottom-right
            var _trackCount = 0;
            window.__TAURI__.event.listen('terminal-position', function(event) {
                var info = event.payload;
                _trackCount++;

                // Always store the latest position (fixes race where tracker emits
                // before agent is loaded — we apply it in loadAndStart).
                _lastTerminalInfo = info;

                if (!currentAgent) return;
                if (!info.found) return;

                // Hide Clippy when another window is in the foreground
                // (so he doesn't float on top of Settings, browser, etc.)
                if (!info.foreground) {
                    // Hide all clippy elements via jQuery
                    $('.clippy, .clippy-balloon').css('visibility', 'hidden');
                    return;
                }

                // Terminal is foreground — ensure Clippy is visible and positioned
                $('.clippy, .clippy-balloon').css('visibility', 'visible');

                positionAgentAtTerminal(currentAgent, info);
            });

            // Listen for agent switch from tray menu
            window.__TAURI__.event.listen('clippy-switch-agent', function(event) {
                var agentName = event.payload;
                console.log('Switching agent to:', agentName);
                switchAgent(agentName, function(agent) {
                    ClippyBridge.init(agent);
                    agent.speak("I'm " + agentName + "! Nice to meet you.");
                });
            });

            // Listen for anchor corner change from tray
            window.__TAURI__.event.listen('clippy-anchor', function(event) {
                _anchor = event.payload;
                console.log('Anchor changed to:', _anchor);
                // Persist via Tauri command
                window.__TAURI__.core.invoke('save_anchor', { anchor: _anchor });
                // Reposition immediately
                if (currentAgent && _lastTerminalInfo && _lastTerminalInfo.found) {
                    positionAgentAtTerminal(currentAgent, _lastTerminalInfo);
                }
            });

            // Listen for vertical offset change from tray
            window.__TAURI__.event.listen('clippy-offset', function(event) {
                var data = event.payload;
                if (data.reset) {
                    _verticalOffset = 0;
                } else {
                    _verticalOffset += data.delta;
                    // Clamp to reasonable range
                    _verticalOffset = Math.max(0, Math.min(500, _verticalOffset));
                }
                console.log('Vertical offset:', _verticalOffset);
                // Persist via Tauri command
                window.__TAURI__.core.invoke('save_vertical_offset', { offset: _verticalOffset });
                // Reposition immediately
                if (currentAgent && _lastTerminalInfo && _lastTerminalInfo.found) {
                    positionAgentAtTerminal(currentAgent, _lastTerminalInfo);
                }
            });

            console.log('ClippyBridge: Tauri event listeners registered');
        }

        // Load agent and initialize — uses config for preferred agent if available
        function initializeApp() {
            var startAgent = 'Clippy';
            var startPosition = null;

            function loadAndStart(agentName, position) {
                clippy.load(agentName, function(agent) {
                    currentAgent = agent;
                    currentAgentName = agentName;

                    // If the tracker already sent a terminal position before
                    // the agent was ready, apply it now. Otherwise fall back
                    // to any saved config position.
                    if (_lastTerminalInfo && _lastTerminalInfo.found) {
                        positionAgentAtTerminal(agent, _lastTerminalInfo);
                    } else if (position) {
                        agent.moveTo(position.x, position.y, 0);
                    }

                    agent.show();
                    hookDragSave(agent);

                    // Initialize the event bridge
                    ClippyBridge.init(agent);

                    // Initial greeting
                    agent.speak(agentName + ' Awakens! Listening for Claude Code events.');

                    // Run self-tests
                    clippySelfTest(agent);
                    testEventMapping();

                    console.log(agentName + ' loaded successfully');
                }, function(err) {
                    console.error('Failed to load ' + agentName + ':', err);
                    // Fallback to Clippy if preferred agent fails
                    if (agentName !== 'Clippy') {
                        console.log('Falling back to Clippy...');
                        loadAndStart('Clippy', position);
                    }
                });
            }

            // Register Tauri listeners BEFORE loading the agent so that
            // terminal-position events are captured even while clippy.js
            // is still loading its sprite sheet.
            if (window.__TAURI__) {
                registerTauriListeners();

                window.__TAURI__.core.invoke('get_config').then(function(config) {
                    console.log('Loaded config:', config);
                    startAgent = config.agent || 'Clippy';
                    startPosition = config.position || null;
                    // Restore anchor + offset from saved config
                    _anchor = config.anchor || 'bottom-right';
                    _verticalOffset = config.vertical_offset || 0;
                    console.log('Anchor:', _anchor, 'Offset:', _verticalOffset);
                    loadAndStart(startAgent, startPosition);
                }).catch(function(err) {
                    console.warn('Failed to load config, using defaults:', err);
                    loadAndStart('Clippy', null);
                });
            } else {
                loadAndStart('Clippy', null);
            }
        }

        initializeApp();

        // Debug: Trigger events manually from browser console
        window.testEvent = function(type) {
            ClippyBridge.handleEvent(type || 'complete');
        };

        window.testAllEvents = function() {
            var events = ['complete', 'error', 'attention', 'stop', 'session-end'];
            var delay = 0;
            events.forEach(function(type) {
                setTimeout(function() {
                    console.log('Testing event:', type);
                    ClippyBridge.handleEvent(type);
                }, delay);
                delay += 10000; // 10 seconds between each
            });
        };
    </script>
</body>
</html>
